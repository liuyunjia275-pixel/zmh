<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f9f1e7" />
  <title>我们的小宇宙</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <section class="hero" aria-label="我们的小宇宙">
      <div class="sun"></div><i class="spark s1">✦</i><i class="spark s2">✧</i><i class="spark s3">✦</i>
      <p class="eyebrow">OUR LITTLE UNIVERSE · 2026</p>
      <h1>我们的小宇宙</h1>
      <p class="hero-copy">把平凡的日子，过成彼此眼里的光。<br>在每一个向前的清晨，也在每一次开怀的笑里。</p>
      <a class="scroll" href="#story">向下读一读 <span>↓</span></a>
      <div class="horizon"></div>
    </section>

    <section id="story" class="story section">
      <p class="kicker">A SMALL PROMISE</p>
      <div class="story-grid">
        <h2>愿我们一直<br><em>向阳而行。</em></h2>
        <div class="note">不必等所有事情都准备好。<br>只要并肩，今天就值得出发。<br><br><span>— 写给我们</span></div>
      </div>
    </section>

    <section class="gallery section">
      <p class="kicker">OUR BRIGHT MOMENTS</p>
      <h2>笑起来的时刻，<br>连时间也会放慢。</h2>
      <div class="photos">
        <figure class="photo photo-one"><img src="1.jpg" alt="我们在毕业日的合照" /><figcaption>一个向上的手势，<br>一整天的好心情。</figcaption></figure>
        <figure class="photo photo-two"><img src="2.jpg" alt="我们在一起的合照" /><figcaption>在寻常处<br>收集闪闪发光。</figcaption></figure>
        <figure class="photo photo-three"><img src="3.jpg" alt="我们的美好瞬间" /><figcaption>把每一次相见，<br>都当作新的开始。</figcaption></figure>
      </div>
    </section>

    <section class="wish section">
      <div class="wish-card">
        <p class="kicker">TODAY'S LITTLE WISH</p>
        <p id="wish-text">愿今天的你，收到一个不期而遇的好消息。</p>
        <button id="wish-button" type="button">抽一张今日小笺 <span>→</span></button>
      </div>
    </section>
  </main>
  <footer>FOR US, WITH SUNSHINE &amp; A LITTLE BIT OF POETRY <span>☼</span></footer>
  <script src="script.js"></script>
</body>
</html>
